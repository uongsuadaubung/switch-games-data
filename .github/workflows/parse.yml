name: Parse ZIP → games.json

on:
  push:
    paths:
      - 'source/latest.zip'   # Chỉ trigger khi bạn push đúng file này
  workflow_dispatch:           # Cho phép chạy thủ công từ GitHub UI

jobs:
  parse:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # Cần quyền để commit ngược lại repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Parse ZIP → games.json + version.json
        run: python scripts/parse_zip.py source/latest.zip

      - name: Show result
        run: |
          echo "=== version.json ==="
          cat data/version.json
          echo ""
          echo "=== games.json (first 3 games) ==="
          python -c "
          import json
          games = json.load(open('data/games.json', encoding='utf-8'))
          for g in games[:3]:
              print(f'  - {g[\"name\"]} ({g[\"game_id\"]})')
          print(f'  ... total: {len(games)} games')
          "

      - name: Commit & push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/games.json data/version.json
          # Chỉ commit nếu có thay đổi thực sự
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "🎮 Update games data — $(python -c "import json; d=json.load(open('data/version.json')); print(f\"{d['game_count']} games @ {d['timestamp']}\")")"
          git push
